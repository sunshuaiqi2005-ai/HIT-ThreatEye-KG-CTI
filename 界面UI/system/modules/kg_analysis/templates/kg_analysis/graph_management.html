<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.css" rel="stylesheet">
    <style>
        .container-fluid {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        #graph-container {
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .alert {
            margin-top: 10px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #0d6efd;
        }
        .upload-area i {
            font-size: 48px;
            color: #6c757d;
            margin-bottom: 10px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="page-header">
            <h2>知识图谱管理</h2>
            <a href="/kg_analysis" class="btn btn-secondary back-btn">
                <i class="bi bi-arrow-left"></i>
                返回图谱分析
            </a>
        </div>
        
        <div class="row">
            <!-- 左侧操作面板 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs">
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="tab" href="#upload-tab">批量导入</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#node-tab">节点管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#relationship-tab">关系管理</a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <div class="tab-content">
                            <!-- 文件上传表单 -->
                            <div class="tab-pane fade show active" id="upload-tab">
                                <div class="upload-area" id="dropZone">
                                    <i class="bi bi-cloud-upload"></i>
                                    <h5>拖拽文件到此处或点击上传</h5>
                                    <p class="text-muted">支持 .txt, .json 文件</p>
                                    <input type="file" id="fileInput" style="display: none" accept=".txt,.json">
                                </div>
                                <div class="form-group">
                                    <label for="fileContent">文件内容预览</label>
                                    <textarea class="form-control" id="fileContent" rows="10" readonly></textarea>
                                </div>
                                <button class="btn btn-primary w-100" onclick="uploadAndParse()">开始导入</button>
                            </div>
                            
                            <!-- 节点管理表单 -->
                            <div class="tab-pane fade" id="node-tab">
                                <form id="node-form">
                                    <div class="form-group">
                                        <label for="node-name">节点名称</label>
                                        <input type="text" class="form-control" id="node-name" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="node-labels">标签（用逗号分隔）</label>
                                        <input type="text" class="form-control" id="node-labels">
                                    </div>
                                    <div class="form-group">
                                        <label for="node-properties">属性（JSON格式）</label>
                                        <textarea class="form-control" id="node-properties" rows="3"></textarea>
                                    </div>
                                    <div class="btn-group" role="group">
                                        <button type="submit" class="btn btn-primary">添加节点</button>
                                        <button type="button" class="btn btn-warning" id="update-node">更新节点</button>
                                        <button type="button" class="btn btn-danger" id="delete-node">删除节点</button>
                                    </div>
                                </form>
                            </div>
                            
                            <!-- 关系管理表单 -->
                            <div class="tab-pane fade" id="relationship-tab">
                                <form id="relationship-form">
                                    <div class="form-group">
                                        <label for="from-node">起始节点</label>
                                        <input type="text" class="form-control" id="from-node" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="to-node">目标节点</label>
                                        <input type="text" class="form-control" id="to-node" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="rel-type">关系类型</label>
                                        <input type="text" class="form-control" id="rel-type" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="rel-properties">属性（JSON格式）</label>
                                        <textarea class="form-control" id="rel-properties" rows="3"></textarea>
                                    </div>
                                    <div class="btn-group" role="group">
                                        <button type="submit" class="btn btn-primary">添加关系</button>
                                        <button type="button" class="btn btn-warning" id="update-relationship">更新关系</button>
                                        <button type="button" class="btn btn-danger" id="delete-relationship">删除关系</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 操作结果提示 -->
                <div id="alert-container"></div>
            </div>
            
            <!-- 右侧图谱显示 -->
            <div class="col-md-8">
                <div id="graph-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // 初始化图谱
        const container = document.getElementById('graph-container');
        const nodes = new vis.DataSet();
        const edges = new vis.DataSet();
        const network = new vis.Network(container, { nodes, edges }, {
            nodes: {
                shape: 'dot',
                size: 16
            },
            edges: {
                arrows: 'to',
                smooth: {
                    type: 'continuous'
                }
            },
            physics: {
                stabilization: false,
                barnesHut: {
                    gravitationalConstant: -80000,
                    springConstant: 0.001,
                    springLength: 200
                }
            }
        });

        // 显示提示信息
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // 文件上传相关
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileContent = document.getElementById('fileContent');

        // 点击上传区域触发文件选择
        dropZone.addEventListener('click', () => fileInput.click());

        // 处理文件拖放
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#0d6efd';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#ddd';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#ddd';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // 处理文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 处理文件内容
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fileContent.value = e.target.result;
            };
            reader.readAsText(file);
        }

        // 上传并解析文件
        async function uploadAndParse() {
            const content = fileContent.value;
            if (!content) {
                showAlert('请先选择文件', 'warning');
                return;
            }

            try {
                const response = await axios.post('/kg_analysis/api/upload', {
                    content: content
                });
                
                showAlert('文件导入成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '导入失败', 'danger');
            }
        }

        // 节点表单提交
        document.getElementById('node-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const name = document.getElementById('node-name').value;
                const labels = document.getElementById('node-labels').value.split(',').map(l => l.trim());
                const properties = JSON.parse(document.getElementById('node-properties').value || '{}');
                
                const response = await axios.post('/kg_analysis/api/node', {
                    name,
                    labels,
                    properties
                });
                
                showAlert('节点添加成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '操作失败', 'danger');
            }
        });

        // 关系表单提交
        document.getElementById('relationship-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const from_node = document.getElementById('from-node').value;
                const to_node = document.getElementById('to-node').value;
                const type = document.getElementById('rel-type').value;
                const properties = JSON.parse(document.getElementById('rel-properties').value || '{}');
                
                const response = await axios.post('/kg_analysis/api/relationship', {
                    from_node,
                    to_node,
                    type,
                    properties
                });
                
                showAlert('关系添加成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '操作失败', 'danger');
            }
        });

        // 更新节点
        document.getElementById('update-node').addEventListener('click', async () => {
            try {
                const name = document.getElementById('node-name').value;
                const properties = JSON.parse(document.getElementById('node-properties').value || '{}');
                
                const response = await axios.put(`/kg_analysis/api/node/${name}`, {
                    properties
                });
                
                showAlert('节点更新成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '操作失败', 'danger');
            }
        });

        // 删除节点
        document.getElementById('delete-node').addEventListener('click', async () => {
            if (!confirm('确定要删除该节点吗？')) return;
            
            try {
                const name = document.getElementById('node-name').value;
                const response = await axios.delete(`/kg_analysis/api/node/${name}`);
                
                showAlert('节点删除成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '操作失败', 'danger');
            }
        });

        // 更新关系
        document.getElementById('update-relationship').addEventListener('click', async () => {
            try {
                const from_node = document.getElementById('from-node').value;
                const to_node = document.getElementById('to-node').value;
                const type = document.getElementById('rel-type').value;
                const properties = JSON.parse(document.getElementById('rel-properties').value || '{}');
                
                const response = await axios.put('/kg_analysis/api/relationship', {
                    from_node,
                    to_node,
                    type,
                    properties
                });
                
                showAlert('关系更新成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '操作失败', 'danger');
            }
        });

        // 删除关系
        document.getElementById('delete-relationship').addEventListener('click', async () => {
            if (!confirm('确定要删除该关系吗？')) return;
            
            try {
                const from_node = document.getElementById('from-node').value;
                const to_node = document.getElementById('to-node').value;
                const type = document.getElementById('rel-type').value;
                
                const response = await axios.delete('/kg_analysis/api/relationship', {
                    data: {
                        from_node,
                        to_node,
                        type
                    }
                });
                
                showAlert('关系删除成功');
                updateGraph();
            } catch (error) {
                showAlert(error.response?.data?.error || '操作失败', 'danger');
            }
        });

        // 更新图谱显示
        async function updateGraph() {
            try {
                const response = await axios.get('/kg_analysis/api/attacker-network');
                const data = response.data;
                
                nodes.clear();
                edges.clear();
                
                // 添加节点
                const nodeSet = new Set();
                data.forEach(rel => {
                    if (!nodeSet.has(rel.source)) {
                        nodes.add({
                            id: rel.source,
                            label: rel.source,
                            color: '#ff6b6b'
                        });
                        nodeSet.add(rel.source);
                    }
                    if (!nodeSet.has(rel.target)) {
                        nodes.add({
                            id: rel.target,
                            label: rel.target,
                            color: '#4ecdc4'
                        });
                        nodeSet.add(rel.target);
                    }
                    
                    // 添加边
                    edges.add({
                        from: rel.source,
                        to: rel.target,
                        label: rel.relation_type,
                        arrows: 'to'
                    });
                });
            } catch (error) {
                showAlert('更新图谱失败', 'danger');
            }
        }

        // 初始加载图谱
        updateGraph();
    </script>
</body>
</html>
